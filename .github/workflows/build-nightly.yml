# This workflow will build the extension against the latest Liquibase artifact
name: "Nightly build"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
    nightly-build:
      uses: liquibase/build-logic/.github/workflows/os-extension-test.yml@main
      with:
        nightly: true
        java: '[17, 21]'
        os: '["ubuntu-latest"]'
      secrets: inherit

    hibernate-test:
      name: Test Hibernate ${{ matrix.hibernate }}
      needs: nightly-build
      runs-on: ubuntu-latest
  
      strategy:
        fail-fast: false
        matrix:
          hibernate: ["7.1.16.Final", "7.2.4.Final" ]
  
      steps:
        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
  
        - name: Set up JDK
          uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
          with:
            java-version: 17
            distribution: 'temurin'
            cache: 'maven'
  
        - name: Run Compatibility Tests
          run: mvn -B jacoco:prepare-agent surefire:test -Dhibernate.version=${{ matrix.hibernate }}
  
        - name: Run Tests
          run: mvn -B jacoco:prepare-agent surefire:test
  
        - name: Archive Test Results
          if: ${{ always() }}
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: test-reports-hibernate-${{ matrix.hibernate }}
            path: |
              **/target/surefire-reports
              **/target/jacoco.exec