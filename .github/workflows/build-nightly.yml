# This workflow will build the extension against the latest Liquibase artifact
name: "Nightly build"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
    nightly-build:
      uses: liquibase/build-logic/.github/workflows/os-extension-test.yml@main
      with:
        nightly: true
        java: '[17, 21]'
        os: '["ubuntu-latest"]'
      secrets: inherit

    hibernate-test:
      name: Test Hibernate ${{ matrix.hibernate }}
      needs: nightly-build
      runs-on: ubuntu-latest
  
      strategy:
        fail-fast: false
        matrix:
          hibernate: ["7.1.16.Final", "7.2.4.Final" ]
  
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
  
        - name: Set up JDK
          uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
          with:
            java-version: 17
            distribution: 'temurin'
            cache: 'maven'
  
        - name: Run Compatibility Tests
          run: mvn -B jacoco:prepare-agent surefire:test -Dhibernate.version=${{ matrix.hibernate }}
  
        - name: Run Tests
          run: mvn -B jacoco:prepare-agent surefire:test
  
        - name: Archive Test Results
          if: ${{ always() }}
          uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
          with:
            name: test-reports-hibernate-${{ matrix.hibernate }}
            path: |
              **/target/surefire-reports
              **/target/jacoco.exec