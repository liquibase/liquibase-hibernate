name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: ["hibernate6"]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ["hibernate6"]
  schedule:
    - cron: "16 14 * * 4"

permissions:
  actions: read
  contents: read
  security-events: write
  packages: read
  id-token: write

jobs:
  codeql:
    uses: liquibase/build-logic/.github/workflows/codeql.yml@main
    secrets: inherit
    with:
      languages: '["java"]'
